<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Тест CSS</title>

    <style>
        /* ===== ЭТО CSS ===== */
        body {
            font-family: Arial, sans-serif;
            background: #f0f4ff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 40px 60px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0, 0, 255, 0.15);
            text-align: center;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.03);
            box-shadow: 0 12px 35px rgba(0, 0, 255, 0.25);
        }

        h1 {
            color: #2c3e7a;
            font-size: 32px;
            margin-bottom: 10px;
        }

        p {
            color: #555;
            font-size: 18px;
            margin: 10px 0;
        }

        .btn {
            background: #4a6cf7;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn:hover {
            background: #3355d4;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(74, 108, 247, 0.4);
        }

        .highlight {
            color: #4a6cf7;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- ===== ЭТО HTML ===== -->
    <div class="card">
        <h1>🚀 CSS работает!</h1>
        <p>Этот текст стилизован с помощью <span class="highlight">CSS</span></p>
        <p style="font-size: 14px; color: #999;">Наведи мышку на карточку или кнопку</p>
        <button class="btn" onclick="alert('Привет! JS тоже работает ✅')">
            Нажми меня
        </button>
    </div>

    <!-- ===== ЭТО JS (для проверки) ===== -->
    <script>
        console.log('✅ Страница загружена');
    </script>

</body>
</html>
